name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MIX_ENV: test
  ELIXIR_VERSION: "1.19.5"
  OTP_VERSION: "28.3"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gut_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gut_test

  backup:
    name: Backup database
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency: deploy-group
    steps:
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Dump database via proxy
        run: |
          # Get DATABASE_URL from the app
          DB_URL=$(flyctl ssh console -a goatbiz -C 'printenv DATABASE_URL' 2>/dev/null | tr -d '\r\n')

          # Proxy to the postgres app
          flyctl proxy 15432:5432 -a goatbiz-db &
          sleep 3

          # Rewrite URL to go through the local proxy
          PROXY_URL=$(echo "$DB_URL" | sed -E 's|@[^/]+/|@localhost:15432/|')
          pg_dump -Fc --no-owner --no-acl "$PROXY_URL" > backup.dump
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Upload to Tigris
        run: |
          aws s3 cp backup.dump \
            "s3://${BUCKET_NAME}/backups/$(date +%Y%m%d-%H%M%S).dump" \
            --endpoint-url https://t3.storage.dev
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TIGRIS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TIGRIS_SECRET_ACCESS_KEY }}
          BUCKET_NAME: ${{ secrets.TIGRIS_BUCKET_NAME }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: backup
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-arg GIT_SHA=${GITHUB_SHA::6}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
